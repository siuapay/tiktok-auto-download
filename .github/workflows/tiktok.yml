name: Auto TikTok to Dropbox

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download video
        run: |
          mkdir -p videos
          yt-dlp \
            --download-archive archive.txt \
            --max-downloads 1 \
            --no-playlist \
            -o "videos/%(title)s.%(ext)s" \
            "https://www.tiktok.com/@teacher_linhlinh" || true 

      - name: Check files
        run: ls -R

      - name: Upload to Dropbox
        run: |
          if [ -z "$(ls -A videos)" ]; then
            echo "No new videos to upload"
          else
            for file in videos/*; do
              echo "Uploading $file"
              curl -X POST https://content.dropboxapi.com/2/files/upload \
                --header "Authorization: Bearer ${{ secrets.DROPBOX_TOKEN }}" \
                --header "Dropbox-API-Arg: {\"path\": \"/TikTok/$(basename $file)\", \"mode\": \"add\", \"autorename\": true, \"mute\": false}" \
                --header "Content-Type: application/octet-stream" \
                --data-binary @"$file"
            done
          fi
