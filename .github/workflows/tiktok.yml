name: Auto TikTok Download

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Download video
        run: |
          mkdir videos
          yt-dlp -o "videos/%(title)s.%(ext)s" https://www.tiktok.com/@teacher_linhlinh

      - name: Commit and push
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "auto@bot.com"
          git add .
          git commit -m "auto download video" || echo "no changes"
          git push
